<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        (function() {
            const t = localStorage.getItem('theme') || 'space';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - The Final Check</title>
    <link rel="shortcut icon" href="../library/Favicon.png" type="image/png">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@200;300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../index.css">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            margin: 0;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 24px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: var(--text-primary);
        }
    </style>
</head>

<body>
    <!-- Radial Nebulae Glow Backdrops -->
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>

    <div class="auth-container">
        <div class="card auth-card">
            <a href="../index.html" class="back-btn">← Back to Dashboard</a>
            
            <form id="login-form" class="auth-form" onsubmit="handleLoginSubmit(event)">
                <div class="form-title">Welcome Back</div>
                <div class="form-subtitle">Enter your details to access your chess dashboard.</div>
                
                <div class="form-group">
                    <label for="login-username">Username, Email, or Phone</label>
                    <input type="text" id="login-username" placeholder="e.g. chessmaster" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="password-input-wrap">
                        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="pwd-toggle" onclick="togglePasswordVisibility('login-password')">👁</button>
                    </div>
                </div>

                <div class="auth-error" id="login-error" style="display: none;"></div>
                
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                <p class="auth-switch-text">Don't have an account? <a href="signup.html"><span>Create one</span></a></p>
            </form>
        </div>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="../Database/firebase-db.js"></script>

    <script>
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        async function handleLoginSubmit(event) {
            event.preventDefault();
            const identifier = document.getElementById('login-username').value.trim();
            const passwordInput = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            
            errorEl.style.display = 'none';
            
            let matchedUser = null;
            let usingFirebase = false;

            // 1. Try Firestore login if Firebase is ready
            if (window.firebaseReady && window.db) {
                try {
                    const submitBtn = event.target.querySelector('button[type="submit"]');
                    const originalBtnText = submitBtn.textContent;
                    submitBtn.textContent = 'Verifying...';
                    submitBtn.disabled = true;

                    // Search username directly first
                    const userDoc = await db.collection('users').doc(identifier).get();
                    if (userDoc.exists) {
                        matchedUser = userDoc.data();
                        usingFirebase = true;
                    } else {
                        // Search by Gmail address
                        const emailQuery = await db.collection('users').where('email', '==', identifier).get();
                        if (!emailQuery.empty) {
                            matchedUser = emailQuery.docs[0].data();
                            usingFirebase = true;
                        } else {
                            // Search by Phone number
                            const phoneQuery = await db.collection('users').where('phone', '==', identifier).get();
                            if (!phoneQuery.empty) {
                                matchedUser = phoneQuery.docs[0].data();
                                usingFirebase = true;
                            }
                        }
                    }

                    submitBtn.textContent = originalBtnText;
                    submitBtn.disabled = false;
                } catch (error) {
                    console.error("Firestore signin failed, falling back to localStorage:", error);
                }
            }
            
            // 2. Local Storage fallback if firebase login is offline/not initialized or not found in Firestore
            if (!matchedUser) {
                const users = JSON.parse(localStorage.getItem('users') || '{}');
                for (const username in users) {
                    const user = users[username];
                    if (username === identifier || user.email === identifier || user.phone === identifier) {
                        matchedUser = user;
                        break;
                    }
                }
            }
            
            if (!matchedUser || matchedUser.password !== passwordInput) {
                errorEl.textContent = 'Invalid credentials. Please try again.';
                errorEl.style.display = 'block';
                return;
            }
            
            // Login successful, set session username
            localStorage.setItem('currentUser', matchedUser.username);
            
            // Transfer any guest statistics to the logged-in user if they have 0 games played
            const guestStats = JSON.parse(localStorage.getItem('guestStats') || '{"played": 0, "wins": 0, "losses": 0, "draws": 0}');
            if (guestStats.played > 0) {
                if (!matchedUser.stats || matchedUser.stats.played === 0) {
                    matchedUser.stats = guestStats;
                    
                    // Save guest stats to Firestore if logged in via Firestore
                    if (usingFirebase && window.firebaseReady && window.db) {
                        try {
                            await db.collection('users').doc(matchedUser.username).update({
                                stats: guestStats
                            });
                        } catch (err) {
                            console.error("Failed to sync guest stats to Firestore:", err);
                        }
                    }
                    
                    // Also sync back to LocalStorage
                    const users = JSON.parse(localStorage.getItem('users') || '{}');
                    users[matchedUser.username] = matchedUser;
                    localStorage.setItem('users', JSON.stringify(users));
                }
                // Clear guest statistics
                localStorage.removeItem('guestStats');
            }
            
            // Redirect back to home dashboard or the pending challenge if one exists
            const pendingChallengeId = localStorage.getItem('pendingChallengeId');
            if (pendingChallengeId) {
                localStorage.removeItem('pendingChallengeId');
                window.location.href = '../index.html?challengeId=' + pendingChallengeId;
            } else {
                window.location.href = '../index.html';
            }
        }
    </script>
</body>

</html>
